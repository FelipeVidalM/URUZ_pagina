<section id="booking" class="booking section alt-bg">
    <div class="container">
        <div class="section-header center">
            <h3 class="subtitle">Agendar Cita</h3>
            <h2>Reserva tu espacio de bienestar</h2>
            <p>Selecciona el servicio, el día y la hora que mejor se adapte a tu rutina.</p>
        </div>
        <div class="booking-container">

            <!-- Service Selector -->
            <div class="service-selector">
                <button class="svc-btn active" data-svc="consulta">Consulta Integrativa (45 min)</button>
                <button class="svc-btn" data-svc="suero">Sueroterapia IV (60 min)</button>
            </div>

            <!-- Doctor Selector (Shown only for Consulta) -->
            <div class="doctor-selector" id="doctor-selector" style="display:block;">
                <h4>Especialista:</h4>
                <div class="doc-types">
                    <button class="doc-btn active" data-doc="silva">Dr. Alejandro Silva (Lun, Mie, Vie)</button>
                    <button class="doc-btn" data-doc="mazo">Dra. Carolina Mazo (Mar, Jue, Sab)</button>
                    <button class="doc-btn" data-doc="ruiz">Dr. Javier Ruiz (Lun, Mar, Mie)</button>
                    <button class="doc-btn" data-doc="vargas">Lic. Sofía Vargas (Jue, Vie, Sab)</button>
                    <button class="doc-btn" data-doc="any">Cualquier Profesional</button>
                </div>
            </div>

            <!-- IV Drip Type Selector (Hidden by default) -->
            <div class="iv-type-selector" id="iv-type-selector" style="display:none;">
                <h4>Opciones Clínicas de Sueroterapia:</h4>
                <div class="iv-types">
                    <button class="iv-btn active" data-iv="Vitalidad">Vitalidad ($150.000 COP)</button>
                    <button class="iv-btn" data-iv="Detox">Detox Hepático ($180.000 COP)</button>
                    <button class="iv-btn" data-iv="Inmune">Sistema Inmune ($160.000 COP)</button>
                    <button class="iv-btn" data-iv="Anti-aging">Anti-aging ($200.000 COP)</button>
                </div>
            </div>

            <div class="booking-calendar">
                <div class="days-selector" id="days-selector">
                    <button class="day-btn active" data-day="Lunes">Lunes</button>
                    <button class="day-btn" data-day="Martes">Martes</button>
                    <button class="day-btn" data-day="Miércoles">Miércoles</button>
                    <button class="day-btn" data-day="Jueves">Jueves</button>
                    <button class="day-btn" data-day="Viernes">Viernes</button>
                    <button class="day-btn" data-day="Sábado">Sábado</button>
                </div>
                <div class="time-slots" id="time-slots-container">
                    <!-- Slots generated by JS -->
                </div>
            </div>
            <!-- Confirmation Summary -->
            <div class="booking-summary" id="booking-summary" style="display:none;">
                <h4>Resumen de Cita</h4>
                <p class="summary-details">Has seleccionado el <strong id="summary-day"></strong> a las <strong
                        id="summary-time"></strong>.</p>
                <div class="export-actions">
                    <a href="#" id="btn-gcal" target="_blank" class="btn btn-primary gcal-btn"><i
                            data-feather="calendar"></i> Google Calendar</a>
                    <button id="btn-ics" class="btn btn-secondary ics-btn"><i data-feather="download"></i> Descargar
                        .ics</button>
                </div>
            </div>
        </div>
    </div>
</section>
